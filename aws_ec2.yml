---
plugin: amazon.aws.aws_ec2

regions:
  - ap-south-1

filters:
  instance-state-name: running
  tag:component:
    - "vmstorage"
    - "vm-app"
    - "grafana"

hostnames:
  - ip-address
  - dns-name
  - private-ip-address

keyed_groups:
  - key: tags.component
    prefix: ""
    separator: ""

  - key: tags.extrarole
    prefix: ""
    separator: ""

groups:
  vminsert: "'vm-app' in (tags.component | default(''))"
  vmselect: "'vm-app' in (tags.component | default(''))"
  vmstorage: "'vmstorage' in (tags.component | default(''))"
  vmalert: "'vmalert' in (tags.extrarole | default(''))"
  grafana: "'grafana' in (tags.component | default(''))"
  vmagent: "true"