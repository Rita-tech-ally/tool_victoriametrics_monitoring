---
common_packages:
  - wget
  - curl
  - tar

common_apt_cache_valid_time: 3600

vm_download_url: "https://github.com/VictoriaMetrics/VictoriaMetrics/releases/download/\
  {{ vm_version }}/victoria-metrics-linux-amd64-\
  {{ vm_version }}{{ '-cluster' if vm_setup_mode == 'ha' else '' }}.tar.gz"

vm_utils_download_url: "https://github.com/VictoriaMetrics/VictoriaMetrics/releases/download/\
  {{ vm_version }}/vmutils-linux-\
  {{ 'amd64' if ansible_architecture == 'x86_64' else 'arm64' }}-\
  {{ vm_version }}.tar.gz"

scrape_interval: 10s
