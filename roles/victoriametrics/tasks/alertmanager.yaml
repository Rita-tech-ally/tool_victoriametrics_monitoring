---
# tasks/alertmanager.yaml

# Ensure user and group exist
- name: Ensure Alertmanager group exists
  ansible.builtin.group:
    name: alertmanager
    state: present
  become: true

- name: Ensure Alertmanager user exists
  ansible.builtin.user:
    name: alertmanager
    group: alertmanager
    system: true
    shell: /usr/sbin/nologin
    create_home: false
    state: present
  become: true

- name: Create Alertmanager directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: alertmanager
    group: alertmanager
    mode: "0755"
  loop:
    - /etc/alertmanager
    - /var/lib/alertmanager
  become: true

- name: Create temporary download directory
  ansible.builtin.file:
    path: /tmp/alertmanager_download
    state: directory
    mode: "0755"

- name: Download and extract Alertmanager
  ansible.builtin.unarchive:
    src: "https://github.com/prometheus/alertmanager/releases/download/v0.27.0/alertmanager-0.27.0.linux-amd64.tar.gz"
    dest: /tmp/alertmanager_download
    remote_src: true

- name: Copy Alertmanager binaries to destination
  ansible.builtin.copy:
    src: "/tmp/alertmanager_download/alertmanager-0.27.0.linux-amd64/{{ item }}"
    dest: "/usr/local/bin/{{ item }}"
    owner: alertmanager
    group: alertmanager
    mode: "0755"
    remote_src: true
  loop:
    - alertmanager
    - amtool
  become: true

- name: Deploy Alertmanager basic configuration
  ansible.builtin.template:
    src: alertmanager.yml.j2
    dest: /etc/alertmanager/alertmanager.yml
    owner: alertmanager
    group: alertmanager
    mode: "0644"
  become: true
  notify: Restart alertmanager

- name: Install Alertmanager systemd unit file
  ansible.builtin.template:
    src: alertmanager.service.j2
    dest: /etc/systemd/system/alertmanager.service
    owner: root
    group: root
    mode: "0644"
  become: true
  notify: Restart alertmanager

- name: Force systemd daemon reload
  ansible.builtin.systemd:
    daemon_reload: true
  become: true

- name: Ensure Alertmanager is enabled and running
  ansible.builtin.systemd:
    name: alertmanager
    state: started
    enabled: true
  become: true

- name: Clean up temporary download directory
  ansible.builtin.file:
    path: /tmp/alertmanager_download
    state: absent
