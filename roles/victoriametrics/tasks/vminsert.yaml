---
# HA: vminsert routing configuration

- name: Create temporary download directory for vminsert
  ansible.builtin.file:
    path: /tmp/vm_download_insert
    state: directory
    mode: "0755"

- name: Download and extract VictoriaMetrics cluster archive for vminsert
  ansible.builtin.unarchive:
    src: "{{ vm_download_url }}"
    dest: /tmp/vm_download_insert
    remote_src: true

- name: Place vminsert binary
  ansible.builtin.copy:
    src: /tmp/vm_download_insert/vminsert-prod
    dest: "{{ vm_bin_dir }}/{{ vm_binaries.vminsert }}"
    owner: "{{ vm_user }}"
    group: "{{ vm_group }}"
    mode: "0755"
    remote_src: true
  become: true

- name: Clean up temporary download directory for vminsert
  ansible.builtin.file:
    path: /tmp/vm_download_insert
    state: absent
  become: true

- name: Install vminsert systemd unit file
  ansible.builtin.template:
    src: vminsert.service.j2
    dest: /etc/systemd/system/vminsert.service
    owner: root
    group: root
    mode: "0644"
  become: true
  notify: Restart vminsert

- name: Force systemd to reread configs (daemon-reload)
  ansible.builtin.systemd:
    daemon_reload: true
  become: true

- name: Ensure vminsert service is enabled and running
  ansible.builtin.systemd:
    name: vminsert
    state: started
    enabled: true
  become: true
