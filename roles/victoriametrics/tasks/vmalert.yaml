---
- name: Ensure vmuser group exists for vmalert
  ansible.builtin.group:
    name: "{{ vm_group }}"
    state: present
  become: true

- name: Ensure vmuser user exists for vmalert
  ansible.builtin.user:
    name: "{{ vm_user }}"
    group: "{{ vm_group }}"
    system: true
    shell: /usr/sbin/nologin
    create_home: false
    state: present
  become: true

- name: Remove any stale temporary download directory
  ansible.builtin.file:
    path: /tmp/vm_download_alert
    state: absent

- name: Create fresh temporary download directory for vmalert
  ansible.builtin.file:
    path: /tmp/vm_download_alert
    state: directory
    mode: "0755"

- name: Download and extract VictoriaMetrics vmutils archive (Contains vmalert)
  ansible.builtin.unarchive:
    src: "{{ vm_utils_download_url }}"
    dest: /tmp/vm_download_alert
    remote_src: true

- name: Place vmalert binary and ensure execution bits
  ansible.builtin.copy:
    src: /tmp/vm_download_alert/vmalert-prod
    dest: "/usr/local/bin/vmalert-prod"
    owner: "{{ vm_user }}"
    group: "{{ vm_group }}"
    mode: "0755"
    remote_src: true
  become: true

- name: Template systemd service file for vmalert
  ansible.builtin.template:
    src: vmalert.service.j2
    dest: /etc/systemd/system/vmalert.service
    owner: root
    group: root
    mode: "0644"
  become: true

- name: Force systemd daemon reload
  ansible.builtin.systemd:
    daemon_reload: true
  become: true

- name: Restart vmalert service
  ansible.builtin.systemd:
    name: vmalert
    state: restarted
    enabled: true
  become: true

- name: Clean up temporary download directory for vmalert
  ansible.builtin.file:
    path: /tmp/vm_download_alert
    state: absent
