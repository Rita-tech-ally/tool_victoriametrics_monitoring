---
# HA: vmstorage stores the data and serves vminsert (:8400) and vmselect (:8401).

- name: Ensure vmstorage data directory exists
  ansible.builtin.file:
    path: "{{ vm_storage_path }}"
    state: directory
    owner: "{{ vm_user }}"
    group: "{{ vm_group }}"
    mode: "0750"
  become: true

- name: Create temporary download directory on remote node
  ansible.builtin.file:
    path: /tmp/vm_download
    state: directory
    mode: "0755"

- name: Download and extract VictoriaMetrics cluster archive directly on remote node
  ansible.builtin.unarchive:
    src: "{{ vm_download_url }}"
    dest: /tmp/vm_download
    remote_src: true

- name: Copy vmstorage binary to final destination
  ansible.builtin.copy:
    src: /tmp/vm_download/vmstorage-prod
    dest: "{{ vm_bin_dir }}/{{ vm_binaries.vmstorage }}"
    owner: "{{ vm_user }}"
    group: "{{ vm_group }}"
    mode: "0755"
    remote_src: true
  become: true

- name: Clean up temporary download directory
  ansible.builtin.file:
    path: /tmp/vm_download
    state: absent

- name: Install vmstorage systemd unit
  ansible.builtin.template:
    src: vmstorage.service.j2
    dest: /etc/systemd/system/vmstorage.service
    owner: root
    group: root
    mode: "0644"
  become: true
  notify: Restart vmstorage

- name: Enable and start vmstorage
  ansible.builtin.systemd:
    name: vmstorage
    enabled: true
    state: started
    daemon_reload: true
  become: true
