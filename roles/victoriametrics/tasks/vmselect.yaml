---
# HA: vmselect selects the data from vmstorage (:8401).

- name: Create temporary download directory for vmselect
  ansible.builtin.file:
    path: /tmp/vm_download_select
    state: directory
    mode: "0755"

- name: Download and extract VictoriaMetrics cluster archive for vmselect
  ansible.builtin.unarchive:
    src: "{{ vm_download_url }}"
    dest: /tmp/vm_download_select
    remote_src: true

- name: Place vmselect binary
  ansible.builtin.copy:
    src: /tmp/vm_download_select/vmselect-prod
    dest: "{{ vm_bin_dir }}/{{ vm_binaries.vmselect }}"
    owner: "{{ vm_user }}"
    group: "{{ vm_group }}"
    mode: "0755"
    remote_src: true
  become: true

- name: Clean up temporary download directory for vmselect
  ansible.builtin.file:
    path: /tmp/vm_download_select
    state: absent

- name: Install vmselect systemd unit file
  ansible.builtin.template:
    src: vmselect.service.j2
    dest: /etc/systemd/system/vmselect.service
    owner: root
    group: root
    mode: "0644"
  become: true
  notify: Restart vmselect

- name: Force systemd to reread configs (daemon-reload)
  ansible.builtin.systemd:
    daemon_reload: true
  become: true

- name: Ensure vmselect service is enabled and running
  ansible.builtin.systemd:
    name: vmselect
    state: started
    enabled: true
  become: true
