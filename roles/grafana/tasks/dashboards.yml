---
- name: Create Grafana dashboards directory
  ansible.builtin.file:
    path: /var/lib/grafana/dashboards
    state: directory
    owner: grafana
    group: grafana
    mode: "0755"

- name: Provision VictoriaMetrics dashboard provider config
  ansible.builtin.template:
    src: victoriametrics-dashboards-provider.yml.j2
    dest: /etc/grafana/provisioning/dashboards/victoriametrics.yml
    owner: root
    group: grafana
    mode: "0644"
  notify: Restart Grafana

- name: Download official VictoriaMetrics dashboards
  ansible.builtin.get_url:
    url: "{{ item.url }}"
    dest: "/var/lib/grafana/dashboards/{{ item.name }}"
    owner: grafana
    group: grafana
    mode: "0644"
  loop:
    - name: victoriametrics-cluster.json
      url: >-
        https://raw.githubusercontent.com/VictoriaMetrics/VictoriaMetrics/master/dashboards/victoriametrics-cluster.json
    - name: vmagent.json
      url: >-
        https://raw.githubusercontent.com/VictoriaMetrics/VictoriaMetrics/master/dashboards/vmagent.json
    - name: vmalert.json
      url: >-
        https://raw.githubusercontent.com/VictoriaMetrics/VictoriaMetrics/master/dashboards/vmalert.json
  notify: Restart Grafana
